syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.mycompany.grpc";
option java_outer_classname = "AuthProto";

package auth;

service AuthServiceGrpc {
  // Para que el usuario entre al sistema
  rpc login (LoginRequest) returns (AuthResponse);
  
  // Para que el Gateway o los servicios validen si un token sigue siendo bueno
  rpc validateToken (TokenRequest) returns (ValidationResponse);
}

message LoginRequest {
  string username = 1;
  string password = 2;
}

message TokenRequest {
  string token = 1;
}

message AuthResponse {
  string token = 1;
  string role = 2;
  bool success = 3;
  string message = 4;
}

message ValidationResponse {
  bool isValid = 1;
  string userId = 2;
  string role = 3;
}