## YAML Template.
server:
  port: 8080

spring:
  cloud:
    gateway:
      routes:
        # Ruta para el servicio de Clientes y Vehículos
        - id: customer_vehicle_service
          uri: http://localhost:8081 
          predicates:
            - Path=/api/customers/**, /api/vehicles/**
            
        # Ruta para el servicio de inventario y servicios  
        - id: inventory_service
          uri: http://localhost:8082
          predicates:
            - Path=/api/catalog/**