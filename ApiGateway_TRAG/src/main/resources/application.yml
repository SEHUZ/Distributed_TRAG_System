## YAML Template.
server:
  port: 8080

spring:
  cloud:
    gateway:
      routes:
        # Ruta de Servicio de Autenticación
        - id: auth_service
          uri: http://localhost:8084
          predicates:
            - Path=/api/auth/**
            
            
        # Ruta para el servicio de Clientes y Vehículos
        - id: customer_vehicle_service
          uri: http://localhost:8081 
          predicates:
            - Path=/api/customers/**, /api/vehicles/**
          filters:
            - AuthenticationFilter # Exige JWT válido
            
        # Ruta para el servicio de inventario y servicios  
        - id: inventory_service
          uri: http://localhost:8082
          predicates:
            - Path=/api/catalog/**
          filters:
            - AuthenticationFilter # Exige JWT válido
            
        # Ruta para el servicio de cotizaciones
        - id: quote_service_soap
          uri: http://localhost:8083
          predicates:
            - Path=/ws/**
          filters:
            - AuthenticationFilter # Exige JWT válido
            
            
            
